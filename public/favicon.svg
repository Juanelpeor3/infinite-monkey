<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <!-- Background -->
    <rect width="32" height="32" rx="6" fill="#1e1e1e"/>

    <!-- Ears -->
    <circle cx="5" cy="14" r="5" fill="#a07850"/>
    <circle cx="27" cy="14" r="5" fill="#a07850"/>
    <circle cx="5" cy="14" r="2.8" fill="#d4a46a"/>
    <circle cx="27" cy="14" r="2.8" fill="#d4a46a"/>

    <!-- Head -->
    <ellipse cx="16" cy="15" rx="11" ry="10.5" fill="#a07850"/>

    <!-- Muzzle -->
    <ellipse cx="16" cy="20" rx="6.5" ry="4.5" fill="#d4a46a"/>

    <!-- Eyes -->
    <circle cx="12" cy="13" r="3.5" fill="#fff"/>
    <circle cx="20" cy="13" r="3.5" fill="#fff"/>
    <circle cx="12.8" cy="13.5" r="2" fill="#1a1a1a"/>
    <circle cx="20.8" cy="13.5" r="2" fill="#1a1a1a"/>
    <!-- Eye shine -->
    <circle cx="13.5" cy="12.5" r="0.7" fill="#fff"/>
    <circle cx="21.5" cy="12.5" r="0.7" fill="#fff"/>

    <!-- Nose -->
    <ellipse cx="16" cy="18.5" rx="2" ry="1.2" fill="#7a5a30"/>

    <!-- Smile -->
    <path d="M12.5 21.5 Q16 25 19.5 21.5" stroke="#7a5a30" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
